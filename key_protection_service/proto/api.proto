syntax = "proto3";

package keymanager.key_protection_service;

import "km_common/proto/algorithms.proto";

option go_package = "github.com/GoogleCloudPlatform/key-protection-module/key_protection_service/proto;kpspb";

service KeyProtectionService {
  rpc GenerateKEMKeypair(GenerateKEMKeypairRequest) returns (GenerateKEMKeypairResponse);
  rpc DecapAndSeal(DecapAndSealRequest) returns (DecapAndSealResponse);
  rpc EnumerateKEMKeys(EnumerateKEMKeysRequest) returns (EnumerateKEMKeysResponse);
  rpc DestroyKEMKey(DestroyKEMKeyRequest) returns (DestroyKEMKeyResponse);
  rpc GetKEMKey(GetKEMKeyRequest) returns (GetKEMKeyResponse);
}

message GenerateKEMKeypairRequest {
  keymanager.HpkeAlgorithm algo = 1;
  bytes binding_pub_key = 2;
  uint64 lifespan_secs = 3;
}

message GenerateKEMKeypairResponse {
  string kem_uuid = 1;
  bytes kem_pub_key = 2;
}

message DecapAndSealRequest {
  string kem_uuid = 1;
  bytes encapsulated_key = 2;
  bytes aad = 3;
}

message DecapAndSealResponse {
  bytes seal_enc = 1;
  bytes sealed_ct = 2;
}

message EnumerateKEMKeysRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message KEMKeyInfo {
  string id = 1;
  keymanager.HpkeAlgorithm algorithm = 2;
  bytes kem_pub_key = 3;
  uint64 remaining_lifespan_secs = 4;
}

message EnumerateKEMKeysResponse {
  repeated KEMKeyInfo keys = 1;
  bool has_more = 2;
}

message DestroyKEMKeyRequest {
  string kem_uuid = 1;
}

message DestroyKEMKeyResponse {
}

message GetKEMKeyRequest {
  string kem_uuid = 1;
}

message GetKEMKeyResponse {
  bytes kem_pub_key = 1;
  bytes binding_pub_key = 2;
  keymanager.HpkeAlgorithm algorithm = 3;
  uint64 remaining_lifespan_secs = 4;
}
