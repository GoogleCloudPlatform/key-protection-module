# Fluent Bit configuration for the KPS guest VM, read by fluent-bit-kps.service.
#
# The KPS VM has no route to Cloud Logging, so records are forwarded to the
# workload VM, whose own Fluent Bit relays them onward.

[SERVICE]
    flush           1
    daemon          Off
    log_level       info
    storage.metrics on

# ==============================================================================
# INPUT CONFIGURATION
# ==============================================================================
# 1. Source: The keymanager and attestation services run in the foreground,
#    so their standard output is automatically captured by systemd journald.
#
# 2. Scope: We explicitly filter for only these specific systemd units.
#
# 3. Buffering: We use 'storage.type memrb' (Memory Ring Buffer) with a 32MB
#    limit per input. If the buffer fills up (e.g., due to a relay failure),
#    Fluent Bit will drop the oldest logs instead of pausing.

[INPUT]
    Name           systemd
    Tag            kps.keymanager
    Systemd_Filter _SYSTEMD_UNIT=keymanager.service
    DB             /var/log/google-fluentbit/kps-keymanager.log.db
    Read_From_Tail False
    Mem_Buf_Limit  32M
    storage.type   memrb

[INPUT]
    Name           systemd
    Tag            kps.attestation
    Systemd_Filter _SYSTEMD_UNIT=attestation.service
    DB             /var/log/google-fluentbit/kps-attestation.log.db
    Read_From_Tail False
    Mem_Buf_Limit  32M
    storage.type   memrb

[FILTER]
    Name  modify
    Match kps.keymanager
    Add   service.name key_protection_service

[FILTER]
    Name  modify
    Match kps.attestation
    Add   service.name attestation_service

# Retry_Limit False retries forever, so a receiver outage applies backpressure
# via Mem_Buf_Limit instead of discarding records. `forward` preserves the tag, which
# the workload VM's stackdriver output turns into the Cloud Logging logName.
[OUTPUT]
    Name        forward
    Match       kps.*
    Host        192.168.100.2
    Port        24224
    Retry_Limit False
