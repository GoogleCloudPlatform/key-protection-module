# Fluent Bit configuration for the KPS guest VM, read by fluent-bit-kps.service.
#
# The KPS VM has no route to Cloud Logging, so records are forwarded to the
# workload VM, whose own Fluent Bit relays them onward.

[SERVICE]
    flush           1
    daemon          Off
    log_level       info
    storage.metrics on

# keymanager.service runs the agent container in the foreground, so the agent's
# stdout lands in that unit's journal.
#
# Only our units are tailed: the workload VM's stackdriver output matches `*`, so
# anything tailed here leaves the confidential boundary. Omitting fluent-bit.service
# also stops its connection-failure logs from feeding back in.
#
# Mem_Buf_Limit is per-input; Fluent Bit has no global memory cap for memory-only
# buffering. On overlimit the input pauses and stops reading rather than dropping
# records, resuming from the DB cursor once the output drains.
[INPUT]
    Name           systemd
    Tag            kps.keymanager
    Systemd_Filter _SYSTEMD_UNIT=keymanager.service
    DB             /var/log/google-fluentbit/kps-keymanager.log.db
    Read_From_Tail False
    Mem_Buf_Limit  32M

[INPUT]
    Name           systemd
    Tag            kps.attestation
    Systemd_Filter _SYSTEMD_UNIT=attestation.service
    DB             /var/log/google-fluentbit/kps-attestation.log.db
    Read_From_Tail False
    Mem_Buf_Limit  32M

[FILTER]
    Name  modify
    Match kps.*
    Add   service.name key_protection_service

# Retry_Limit False retries forever, so a receiver outage applies backpressure
# via Mem_Buf_Limit instead of discarding records. `forward` preserves the tag, which
# the workload VM's stackdriver output turns into the Cloud Logging logName.
[OUTPUT]
    Name        forward
    Match       kps.*
    Host        192.168.100.2
    Port        24224
    Retry_Limit False
