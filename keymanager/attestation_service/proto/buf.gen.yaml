version: v2
plugins:
  - local:
      - go
      - run
      - google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
    out: gen
    opt:
      - module=github.com/GoogleCloudPlatform/key-protection-module/keymanager/attestation_service/proto
  - local:
      - go
      - run
      - google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
    out: gen
    opt:
      - module=github.com/GoogleCloudPlatform/key-protection-module/keymanager/attestation_service/proto
