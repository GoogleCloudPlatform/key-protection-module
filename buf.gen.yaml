version: v2
plugins:
  - local:
      - go
      - run
      - google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
    out: .
    opt: paths=source_relative
  - local:
      - go
      - run
      - google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
    out: .
    opt: paths=source_relative,require_unimplemented_servers=false
